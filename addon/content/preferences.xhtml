<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>
<groupbox
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window });"
>
  <label><html:h2 data-l10n-id="pref-title"></html:h2></label>
  <checkbox
    id="zotero-prefpane-__addonRef__-enable"
    preference="enable"
    data-l10n-id="pref-enable"
  />
  <hbox>
    <html:label
      for="zotero-prefpane-__addonRef__-api-key"
      data-l10n-id="pref-api-key"
    ></html:label>
    <html:input
      type="password"
      id="zotero-prefpane-__addonRef__-api-key"
      preference="apiKey"
    ></html:input>
  </hbox>
  <hbox>
    <html:label
      for="zotero-prefpane-__addonRef__-api-base-url"
      data-l10n-id="pref-api-base-url"
    ></html:label>
    <html:input
      type="url"
      id="zotero-prefpane-__addonRef__-api-base-url"
      preference="apiBaseUrl"
    ></html:input>
  </hbox>
  <hbox>
    <html:label
      for="zotero-prefpane-__addonRef__-default-project"
      data-l10n-id="pref-default-project"
    ></html:label>
    <html:input
      type="text"
      id="zotero-prefpane-__addonRef__-default-project"
      preference="defaultProject"
    ></html:input>
  </hbox>
  <hbox>
    <html:label
      for="zotero-prefpane-__addonRef__-heartbeat-interval"
      data-l10n-id="pref-heartbeat-interval"
    ></html:label>
    <html:input
      type="number"
      min="30"
      id="zotero-prefpane-__addonRef__-heartbeat-interval"
      preference="heartbeatInterval"
    ></html:input>
  </hbox>
  <checkbox
    id="zotero-prefpane-__addonRef__-include-title"
    preference="includeTitle"
    data-l10n-id="pref-include-title"
  />
  <checkbox
    id="zotero-prefpane-__addonRef__-show-toolbar-icon"
    preference="showToolbarIcon"
    data-l10n-id="pref-show-toolbar-icon"
  />
</groupbox>
<vbox>
  <html:label
    data-l10n-id="pref-help"
    data-l10n-args='{"time": "__buildTime__","name": "__addonName__","version":"__buildVersion__"}'
  ></html:label>
</vbox>
